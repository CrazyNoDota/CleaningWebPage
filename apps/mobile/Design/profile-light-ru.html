<script>
        function setTheme(theme) {
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                btn.classList.add('hover:bg-surface-container-low');
                const span = btn.querySelector('span:not(.material-symbols-outlined)');
                const icon = btn.querySelector('.material-symbols-outlined');
                if(span) span.classList.add('text-ink-secondary-light');
                if(icon) icon.classList.add('text-ink-secondary-light');
            });

            const activeBtn = event.currentTarget;
            activeBtn.classList.add('bg-primary-container', 'text-on-primary-container');
            activeBtn.classList.remove('hover:bg-surface-container-low');
            const activeSpan = activeBtn.querySelector('span:not(.material-symbols-outlined)');
            const activeIcon = activeBtn.querySelector('.material-symbols-outlined');
            if(activeSpan) activeSpan.classList.remove('text-ink-secondary-light');
            if(activeIcon) activeIcon.classList.remove('text-ink-secondary-light');
            
            // Interaction logic for demo
            console.log('Setting theme to:', theme);
        }

        // Simple smooth entrance
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            main.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
            
            setTimeout(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
