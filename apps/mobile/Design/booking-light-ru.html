<script>
        function increment(id) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText);
            el.innerText = val + 1;
            updatePrice(3000);
        }

        function decrement(id) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText);
            if (val > 1) {
                el.innerText = val - 1;
                updatePrice(-3000);
            }
        }

        let currentPrice = 12500;
        function updatePrice(delta) {
            currentPrice += delta;
            const container = document.querySelector('.price-roll');
            const btnText = document.querySelector('#book-button span');
            
            // Subtle roll animation logic
            container.style.transform = 'translateY(-10px)';
            container.style.opacity = '0';
            
            setTimeout(() => {
                const formatted = currentPrice.toLocaleString('ru-RU');
                container.innerText = formatted;
                btnText.innerText = `Забронировать за ₸ ${formatted}`;
                container.style.transform = 'translateY(0)';
                container.style.opacity = '1';
            }, 100);
        }

        function handleBooking() {
            const btn = document.getElementById('book-button');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">autorenew</span>`;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-80');
                document.getElementById('success-modal').classList.remove('hidden');
                // Haptic feedback simulation
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            }, 1200);
        }

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }
    </script>
