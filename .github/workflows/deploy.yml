name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  # ── Detect which apps changed ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api:        ${{ steps.filter.outputs.api }}
      web-client: ${{ steps.filter.outputs.web-client }}
      web-admin:  ${{ steps.filter.outputs.web-admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'infra/api.Dockerfile'
              - 'pnpm-lock.yaml'
            web-client:
              - 'apps/web-client/**'
              - 'infra/web-client.Dockerfile'
              - 'pnpm-lock.yaml'
            web-admin:
              - 'apps/web-admin/**'
              - 'infra/web-admin.Dockerfile'
              - 'pnpm-lock.yaml'

  # ── API ───────────────────────────────────────────────────────────
  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/shinex/src
            git pull origin main
            cd /opt/shinex
            sudo docker compose --env-file .env build api
            sudo docker compose --env-file .env up -d api
            echo "✓ API deployed"

  # ── Web client ────────────────────────────────────────────────────
  deploy-web-client:
    needs: changes
    if: needs.changes.outputs.web-client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web-client
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/shinex/src
            git pull origin main
            cd /opt/shinex
            sudo docker compose --env-file .env build web-client
            sudo docker compose --env-file .env up -d web-client
            echo "✓ web-client deployed"

  # ── Web admin ─────────────────────────────────────────────────────
  deploy-web-admin:
    needs: changes
    if: needs.changes.outputs.web-admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web-admin
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/shinex/src
            git pull origin main
            cd /opt/shinex
            sudo docker compose --env-file .env build web-admin
            sudo docker compose --env-file .env up -d web-admin
            echo "✓ web-admin deployed"
